<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="output"></div>
      <div class="keypad">
        <div class="row">
          <button class="top-row"><=</button>
          <button class="top-row">C</button>
          <button class="top">%</button>
          <button class="right-column">/</button>
        </div>
        <div class="row">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button class="right-column">*</button>
        </div>
        <div class="row">
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button class="right-column">-</button>
        </div>
        <div class="row">
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button class="right-column">+</button>
        </div>
        <div class="row">
          <button>+/-</button>
          <button>0</button>
          <button>.</button>
          <button class="right-column">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
